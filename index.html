<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HNG 14 Stage 0 - Todo Card</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>
    </head>
<body>

    <article class="todo-card" data-testid="test-todo-card">
        
        <header class="card-header">
            <span class="badge priority-high" data-testid="test-todo-priority" aria-label="Priority: High">High</span>
            
            <div class="status-group">
                <span class="status-text" data-testid="test-todo-status">Pending</span>
                <label class="checkbox-container" aria-label="Mark task as complete">
                    <input type="checkbox" data-testid="test-todo-complete-toggle">
                    <span class="checkmark"></span>
                </label>
            </div>
        </header>

        <div class="card-body">
            <h2 class="todo-title" data-testid="test-todo-title">Finalize GET 205 prcatical</h2>
            <p class="todo-description" data-testid="test-todo-description">
               Review the final draft of the fluid mechanics practical report and verify all capillary elevation measurements before submitting it to the portal
            </p>

            <div class="date-group">
                <time class="due-date" datetime="2026-04-16T23:59:00Z" data-testid="test-todo-due-date">
                    Due April 16, 2026
                </time>
                <time class="time-remaining" data-testid="test-todo-time-remaining">
                    Due in 6 days
                </time>
            </div>
        </div>

        <footer class="card-footer">
            <ul class="tags-list" role="list" data-testid="test-todo-tags">
                <li class="tag" data-testid="test-todo-tag-work">Work</li>
                <li class="tag" data-testid="test-todo-tag-urgent">Urgent</li>
                <li class="tag">Frontend</li>
            </ul>

            <div class="actions-group">
                <button class="btn btn-edit" data-testid="test-todo-edit-button">Edit</button>
                <button class="btn btn-delete" data-testid="test-todo-delete-button">Delete</button>
            </div>
        </footer>

    </article>

    </body>
</html>
